# SpendSense Agent — Google ADK Configuration
# Deployed on Google Cloud Agent Platform
name: spendsense_agent
framework: google-adk
model: gemini-2.5-flash
description: >
  Behavioral finance agent that stops impulse spending before it happens.
  Built for GenZ Indian users on Google Cloud Agent Platform.

tools:
  - name: get_wallet_state
    description: Check current spending position from BigQuery via FastAPI
  - name: get_purchase_history
    description: Get item-level purchase history from MongoDB via FastAPI
  - name: sync_transactions
    description: Trigger Fivetran MCP sync — Google Sheets to BigQuery
  - name: fire_nudge
    description: Send behavioral intervention nudge to user
  - name: get_monthly_report
    description: Generate month-end spending summary

mcp_servers:
  - name: fivetran
    description: Transaction data pipeline — syncs Google Sheets to BigQuery
    endpoint: ${FIVETRAN_MCP_ENDPOINT}

triggers:
  - type: scheduled
    cron: "0 9 * * *"
    action: run_morning_check
  - type: api
    endpoint: /agent/morning-check
    action: run_morning_check
  - type: api
    endpoint: /agent/pre-shop-check
    action: run_pre_shop_check

deployment:
  platform: google-cloud-agent-platform
  project: ${GCP_PROJECT_ID}
  region: us-central1
